services:
  app:
    image: gregordietrich/aimathtutor:${REVISION:-latest}
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.ubuntu
    restart: unless-stopped
    env_file:
      - .env
    environment:
      quarkus.datasource.jdbc.url: jdbc:postgresql://db:5432/${SQL_DATABASE:-aimathtutor}
      quarkus.datasource.username: ${SQL_USERNAME:-aimathtutor}
      quarkus.datasource.password: ${SQL_PASSWORD:-changeit}

      # AI API Keys (sourced from .env file)
      # Provider-specific settings (model, temperature, etc.) are configured
      # at runtime via the Admin Settings UI at /admin/config after login
      # GEMINI_API_KEY: ${GEMINI_API_KEY}
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # OPENAI_ORG_ID: ${OPENAI_ORG_ID}
    ports:
      - "80:9001"
    volumes:
      - aimathtutor_logs:/deployments/logs
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: ${SQL_USERNAME:-aimathtutor}
      POSTGRES_PASSWORD: ${SQL_PASSWORD:-changeit}
      POSTGRES_DB: ${SQL_DATABASE:-aimathtutor}
      POSTGRES_PORT: 5432
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
      - ./src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SQL_USERNAME:-aimathtutor} -d ${SQL_DATABASE:-aimathtutor}"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Uncomment if you want to use pgAdmin:
